<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>

<body>
    <h1>working with list</h1>
    <h2>ordered list</h2>
    <ol>
        <li>to weke up</li>
        <li>call for João</li>
        <li>drink coffee</li>
        <li>brush your teeth</li>
    </ol>
    <h2>list disordered</h2>
    <ul>
        <li>bread</li>
        <li>milk</li>
        <li>tomato</li>
        <li>butter</li>
        <li>rice</li>
        <li>bean</li>
    </ul>

    <h2>definition list</h2>
    <dl>
        <dt>HTML</dt>
        <dd>markup language</dd>
        <dt>CSS</dt>
        <dd>Style language</dd>
        <dt>JavaScript</dt>
        <dd>programming language</dd>
    </dl>
</body>

</html>
