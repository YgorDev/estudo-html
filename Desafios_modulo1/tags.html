<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá ultilizar em cada caso.</p>
    <ul>
        <li title="p> para paragrafos">Parágrafos</li>
        <li title="title> para titulos">Títulos</li>
        <li title="img> para colocar uma imagem">Imagens</li>
        <li title="abb> para Abreviações">Abreviações</li>
        <li title="#">Código-Fonte</li>
        <li title="ol> para lista com números">Lista numerados</li>
        <li title="ul> para listas com demarcações">Listas com demarcações</li>
    </ul>
</body>
</html>
